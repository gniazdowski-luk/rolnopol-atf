name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      app:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      # Upload the Playwright HTML report as an artifact for test result analysis
      - name: Upload Playwright report
        # Use the official GitHub Actions upload-artifact action (version 4)
        uses: actions/upload-artifact@v4
        # Execute this step only when previous steps succeeded or failed (skip on cancellation)
        if: success() || failure()
        with:
          # Name of the artifact that will be created and downloadable, unique per run attempt
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          # Path to the directory containing the report files to upload
          path: playwright-report/
          # Retain the artifact for 30 days before automatic deletion
          retention-days: 30
