name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      app:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers and deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Service is ready"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 2
          done
          echo "Service did not become ready in time"
          exit 1

      - name: Run tests
        run: npm test

      # Upload the Playwright HTML report as an artifact for test result analysis
      - name: Upload Playwright report
        # Use the official GitHub Actions upload-artifact action (version 4)
        uses: actions/upload-artifact@v4
        # Execute this step regardless of whether previous steps succeeded or failed
        if: always()
        with:
          # Name of the artifact that will be created and downloadable
          name: playwright-report
          # Path to the directory containing the report files to upload
          path: playwright-report/
          # Retain the artifact for 30 days before automatic deletion
          retention-days: 30
